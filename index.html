<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I love you LJ.</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="not-loaded">

<div class="sky"></div>
<div class="moon"></div>
<div class="stars"></div>
<div class="mist"></div>
<div class="fireflies"></div>

<h1 id="title"></h1>

<div class="garden">

    <!-- LEFT PLANT -->
    <div class="plant plant-left">
        <div class="leaf leaf-a"></div>
        <div class="leaf leaf-b"></div>
        <svg class="stem" viewBox="0 0 140 300" preserveAspectRatio="none">
            <path class="stem-path" d="M 30 300 Q 95 150 35 15" />
        </svg>
        <div class="bells"></div>
    </div>

    <!-- CENTER PLANT -->
    <div class="plant plant-center">
        <div class="leaf leaf-a"></div>
        <div class="leaf leaf-b"></div>
        <svg class="stem" viewBox="0 0 140 300" preserveAspectRatio="none">
            <path class="stem-path" d="M 30 300 Q 100 145 40 10" />
        </svg>
        <div class="bells"></div>
    </div>

    <!-- RIGHT PLANT -->
    <div class="plant plant-right">
        <div class="leaf leaf-a"></div>
        <div class="leaf leaf-b"></div>
        <svg class="stem" viewBox="0 0 140 300" preserveAspectRatio="none">
            <path class="stem-path" d="M 30 300 Q 90 155 32 20" />
        </svg>
        <div class="bells"></div>
    </div>

</div>

<div class="grass"></div>

<script src="script.js"></script>
</body>
</html>
